{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>📁 Uploaded Files</h2>

    {% if files %}
        <ul>
            {% for file in files %}
                <li>
                    <a href="{{ url_for('uploaded_file', filename=file) }}" target="_blank">
                        {{ file }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No files uploaded yet</p>
    {% endif %}
</div>

{% endblock %}
