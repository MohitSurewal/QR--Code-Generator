<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Code Generator</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }
        .card {
            border-radius: 20px;
        }
        .qr-img {
            max-width: 200px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">
                <h3 class="text-center mb-4">QR Code Generator</h3>

                <form method="POST">
                    <div class="mb-3">
                        <input type="text" name="data" class="form-control" placeholder="Enter text or URL" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            Generate QR Code
                        </button>
                    </div>
                </form>

                {% if qr_image %}
                <div class="text-center">
                    <img src="{{ qr_image }}" class="qr-img">
                </div>
                {% endif %}

            </div>
            {% if qr_image %}
<div class="text-center">
    <img src="{{ qr_image }}" class="qr-img">

    <!-- 🔽 Download Button -->
    <div class="mt-3">
        <a href="/download" class="btn btn-success">
            Download QR Code
        </a>
    </div>
</div>
{% endif %}

        </div>
    </div>
</div>

</body>
</html>
